---
layout: post
---
<article class="post" itemscope itemtype="http://schema.org/BlogPosting">

  <div class="wrapper">
    <div class="trigger site-navigation center-text" style="text-align: center; vertical-align: middle; padding-bottom: 50px;">
      <a class="page-link" href="{{site.url}}{{site.baseurl}}">HOME</a>

      {% for sitePage in site.pages %}
      {% if sitePage.title %}

      <span class="exclamationMark">|</span><a class="page-link" href="{{sitePage.url | prepend: site.baseurl }}">{{sitePage.title}}</a>
      {% endif %}
      {% endfor %}
    </div>
  </div>

  <div class="post-content" itemprop="articleBody">
    {{ content }}
  </div>

  <footer class="postNavigation">
  {% if page.previous.url %}
    <a class="postPrev" href="{{page.previous.url}}">
        &laquo; {{page.previous.title}}
    </a>
  {% endif %}
  {% if page.next.url %}
    <a class="postNext" href="{{page.next.url}}">
        {{page.next.title}} &raquo;
    </a>
  {% endif %}
  </footer>


</article>
